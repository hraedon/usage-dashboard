apiVersion: v1
kind: Secret
metadata:
  name: server-secrets
  namespace: usage-dashboard
type: Opaque
stringData:
  api-key: "REPLACE_WITH_SECURE_KEY"
  claude-token: ""
  claude-refresh-token: ""
  claude-client-id: ""
  # Optional second Claude account (e.g. a work login). Mint a separate token
  # pair with `usage-dashboard login claude` and put it here; leave empty to
  # keep the dashboard's Claude tile single-account.
  claude-work-token: ""
  claude-work-refresh-token: ""
  claude-work-client-id: ""
  zai-api-key: ""
  ollama-cookie: ""
  umans-api-key: ""
  # Optional OpenAI Codex (ChatGPT-plan) account. Mint a dedicated token pair
  # with `usage-dashboard login codex` (loopback OAuth on port 1455) and put the
  # values here; leave empty to keep the Codex tile hidden. codex-account-id is
  # the ChatGPT account id the /wham/usage endpoint scopes to.
  codex-token: ""
  codex-refresh-token: ""
  codex-client-id: ""
  codex-account-id: ""
  # Unused. Ollama login is a local, human-in-the-loop CLI flow
  # (`usage-dashboard login ollama`) because ollama.com uses WorkOS AuthKit
  # (JS form + anti-bot signal) — there is no unattended server-side login from
  # stored credentials. Kept only as placeholders; safe to remove.
  ollama-email: ""
  ollama-password: ""
