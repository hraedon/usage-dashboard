# Ingress for the usage dashboard. The live cluster splits this across two
# ingresses, mirrored here; fill in the CHANGE-ME host / TLS / class values to
# match your setup (hostnames are left as placeholders because this repo is
# public).
#
# 1. EXTERNAL — the API the Pi clients poll. Exposes ONLY the bearer-protected
#    paths: /readings and /schedule. Do NOT add / here (that would expose the
#    unauthenticated /dashboard externally). Both endpoints require the Bearer
#    token, so they're safe on an external host.
#    NOTE: /schedule must be listed here — clients fetch their backlight schedule
#    from it; omitting it silently falls clients back to their built-in default.
#
# 2. INTERNAL — the full app (incl. the unauthenticated /dashboard at `/`) on an
#    internal-only host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: usage-dashboard-readings-ext
  namespace: usage-dashboard
spec:
  ingressClassName: CHANGE-ME-external-ingress-class
  tls:
    - hosts:
        - CHANGE-ME.example.com
      secretName: usage-dashboard-ext-tls
  rules:
    - host: CHANGE-ME.example.com
      http:
        paths:
          - path: /readings
            pathType: Prefix
            backend:
              service:
                name: usage-dashboard-server
                port:
                  number: 8080
          - path: /schedule
            pathType: Prefix
            backend:
              service:
                name: usage-dashboard-server
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: usage-dashboard-ui-int
  namespace: usage-dashboard
spec:
  ingressClassName: CHANGE-ME-internal-ingress-class
  tls:
    - hosts:
        - CHANGE-ME.internal.example.com
      secretName: usage-dashboard-int-tls
  rules:
    - host: CHANGE-ME.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: usage-dashboard-server
                port:
                  number: 8080
