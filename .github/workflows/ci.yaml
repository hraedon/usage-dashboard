name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      # setup-uv v7 no longer auto-provisions a project venv (v5 did), so create
      # one explicitly; uv installs into ./.venv and the steps below invoke tools
      # via .venv/bin/... . UV_PYTHON=3.12 (set by setup-uv) pins the version.
      - run: uv venv
      - run: uv pip install -e ".[dev]"

      - name: ruff
        run: .venv/bin/ruff check .

      - name: mypy
        run: .venv/bin/mypy src/usage_dashboard

      - name: pytest
        # The login extra (Playwright) is intentionally omitted: the interactive
        # ollama-login flow is browser-driven and not unit-tested; its pure
        # helpers are, and they do not import Playwright.
        run: .venv/bin/pytest
