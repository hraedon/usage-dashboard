name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # setup-uv@v5 provisions the .venv; install into it (VIRTUAL_ENV is set),
      # then the steps below invoke tools via .venv/bin/... .
      - run: uv pip install -e ".[dev]"

      - name: ruff
        run: .venv/bin/ruff check .

      - name: mypy
        run: .venv/bin/mypy src/usage_dashboard

      - name: pytest
        # The login extra (Playwright) is intentionally omitted: the interactive
        # ollama-login flow is browser-driven and not unit-tested; its pure
        # helpers are, and they do not import Playwright.
        run: .venv/bin/pytest
