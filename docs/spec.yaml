open_questions:
  - question: "Can ollama.com be logged into via HTTP POST (no JS rendering), or does it require a headless browser?"
    category: "needs_research"
    owner: "Implementing agent"
  - question: "What are the exact mappings for z.ai unit values (3, 5, 6) to session/weekly windows?"
    category: "needs_research"
    owner: "Implementing agent"
  - question: "Does the Claude OAuth API return seven_day reset timestamps, or only percentages?"
    category: "needs_research"
    owner: "Implementing agent"

assumptions:
  - assumption: "Ollama login is HTTP-based"
    rationale: "Assumed that ollama.com accepts standard form-based authentication performable with HTTP requests. If not, headless browser fallback will be used."
  - assumption: "z.ai session window maps to TIME_LIMIT unit=5"
    rationale: "The TIME_LIMIT entry with unit: 5 and a nextResetTime field is assumed to represent the session (5-hour) window. TOKENS_LIMIT entries represent token caps within their windows."
  - assumption: "Claude OAuth token can be long-lived enough for server use"
    rationale: "Assumed that the OAuth token from ~/.claude/.credentials.json can be used server-side with reasonable longevity. If it expires frequently, a refresh mechanism or Web API fallback will be needed."
  - assumption: "Pi Zero 2 W is the target display device"
    rationale: "Assumed based on hardware research. ST7789 LCD driver at 240x320 resolution is the baseline. Rendering should be adaptable to other SPI-driven displays."
  - assumption: "Single API key is sufficient"
    rationale: "One shared Bearer token between server and client is enough. No per-user or per-device differentiation needed."
  - assumption: "SQLite retention of 7 days"
    rationale: "Keeping readings for 7 days is sufficient for current needs and supports future Phase 2 (history/trends) without excessive storage."

handoff:
  decisions_made:
    - decision: "Two-component architecture (server + client)"
      rationale: "Server runs in k8s as Deployment, scrapes providers, serves API. Client runs on Pi Zero, polls server, renders display. Separation of concerns; scraping complexity belongs server-side."
    - decision: "Single monorepo"
      rationale: "One codebase producing two container images with shared data model. Simpler than two repos for a small project."
    - decision: "SQLite for persistence"
      rationale: "File-based, no external database dependency, survives container restarts with volume mount. Adequate for the read/write pattern."
    - decision: "Bearer token auth"
      rationale: "Simplest auth model meeting the requirement of preventing casual snooping. One key, shared between client and server, stored as k8s secret."
  pending:
    - item: "Ollama scraping method (HTTP vs headless browser)"
      why_deferred: "Requires testing against live site"
      impact_if_wrong: "Adding Playwright increases server image by ~400MB and adds complexity"
    - item: "z.ai field mappings (unit values)"
      why_deferred: "Requires empirical testing against the API"
      impact_if_wrong: "Wrong data displayed; easily fixable by adjusting the mapping"
    - item: "Claude OAuth token longevity"
      why_deferred: "Depends on user's Claude account and token lifecycle"
      impact_if_wrong: "Server needs token refresh flow or Web API fallback"
  intent_signals:
    - signal: "hang in my cubicle"
      relevance: "Display is semi-public. Auth prevents snooping but display itself does not need to hide which providers are used."
    - signal: "no dependencies outside this application"
      relevance: "Zero-touch operation after deployment. No cron jobs on personal machines, no manual cookie extraction, no external agents."
    - signal: "I'd prefer to be able to power via USB-C"
      relevance: "Hardware should be USB-C powered. Pi Zero 2 W supports this. Deployment preference, not architectural constraint."
    - signal: "every five minutes would be fine"
      relevance: "Timeliness is valued but not urgency. The dashboard is ambient information, not an alerting system."
    - signal: "historical usage and trend analysis would be nice to have"
      relevance: "Phase 2 interest. Data model and storage should not preclude historical analysis but must not complicate the MVP build."

delta_to_next_level:
  - gap: "Ollama scraping method unknown"
    what_would_close_it: "Test ollama.com auth flow to confirm HTTP-based login works or identify headless browser requirement"
  - gap: "z.ai field mappings uncertain"
    what_would_close_it: "Test the z.ai API response to confirm unit value meanings and map to session/weekly windows"
  - gap: "Claude OAuth response schema uncertain"
    what_would_close_it: "Test the Claude usage API to confirm exact fields returned (reset timestamps, model-specific windows)"
  - gap: "Display pixel layout undefined"
    what_would_close_it: "Define exact pixel positions, font sizes, and bar dimensions for target resolution (240x320)"
